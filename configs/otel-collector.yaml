receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

  filelog:
    include:
      - /runtime/logs/*.jsonl
    start_at: end
    operators:
      - type: json_parser
        parse_from: body

processors:
  resource:
    attributes:
      - action: upsert
        key: service.name
        value: lucidobs

  batch:

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"

  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus]

    logs:
      receivers: [filelog]
      processors: [resource, batch]
      exporters: [otlphttp/loki]