services:
  grafana:
    image: grafana/grafana:11.1.0
    container_name: lucidobs_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: lucidobs_prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  loki:
    image: grafana/loki:3.1.1
    container_name: lucidobs_loki
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki_data:/loki

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: lucidobs_otel_collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      # OTLP gRPC + HTTP
      - "4317:4317"
      - "4318:4318"
      # Prometheus scrape endpoint exposed by collector
      - "8889:8889"
      # Collector health endpoint
      - "13133:13133"

volumes:
  grafana_data:
  prometheus_data:
  loki_data: